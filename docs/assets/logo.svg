  <circle cx="750" cy="60" r="1" fill="#cc44aa" style="animation:star-twinkle 3s ease-in-out infinite 0.5s;"/>
  <circle cx="820" cy="180" r="2" fill="#ccbbff" style="animation:star-twinkle 1.8s ease-in-out infinite 1s;"/>
