<svg class="space-logo" width="876" height="667" viewBox="0 0 876 667" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes nebula-shift {
      0%   { filter: hue-rotate(0deg) brightness(1); }
      50%  { filter: hue-rotate(30deg) brightness(1.3); }
      100% { filter: hue-rotate(0deg) brightness(1); }
    }
    @keyframes star-twinkle {
      0%,100%{ opacity:0.2; }
      50%    { opacity:1; }
    }
    @keyframes data-stream {
      0%   { stroke-dashoffset: 300; opacity:0; }
      20%  { opacity: 0.8; }
      80%  { opacity: 0.8; }
      100% { stroke-dashoffset: 0; opacity: 0; }
    }
    @keyframes chromatic-ab {
      0%,100% { transform: translate(0,0); }
      25%     { transform: translate(1.5px,0); }
      75%     { transform: translate(-1.5px,0); }
    }
    .space-logo { display: block; animation: nebula-shift 8s ease-in-out infinite; }
  </style>
  <defs>
    <linearGradient id="s1" x1="52" y1="51" x2="876" y2="667" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8ddff"/>
      <stop offset="35%" stop-color="#9966ff"/>
      <stop offset="70%" stop-color="#4422cc"/>
      <stop offset="100%" stop-color="#220066"/>
    </linearGradient>
    <linearGradient id="s2" x1="824" y1="52" x2="100" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffccee"/>
      <stop offset="40%" stop-color="#cc44aa"/>
      <stop offset="100%" stop-color="#440033"/>
    </linearGradient>
    <linearGradient id="s3" x1="438" y1="51" x2="300" y2="608" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ccddff"/>
      <stop offset="50%" stop-color="#6677ee"/>
      <stop offset="100%" stop-color="#111055"/>
    </linearGradient>
  </defs>
